name: Nix packages

on:
  pull_request:
    paths:
      - .github/workflows/nix-packages.yml
      - flake.nix
      - flake.lock
      - Cargo.toml
      - Cargo.lock
      - tests/test_nix_package_contract.py
      - "crates/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nix-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Build ${{ matrix.system }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-24.04
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}

      - name: Install pinned Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0

      - name: Validate package workflow contract
        run: python3 tests/test_nix_package_contract.py

      - name: Build and smoke-test the package
        shell: bash
        env:
          SYSTEM: ${{ matrix.system }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          output="$(nix build \
            --accept-flake-config \
            --no-link \
            --no-update-lock-file \
            --print-out-paths \
            ".#packages.${SYSTEM}.diagnostic-triage")"
          "${output}/bin/diagnostic-triage" --version \
            | grep -F "diagnostic-triage 0.1.0-alpha.1"
